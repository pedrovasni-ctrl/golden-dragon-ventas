<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOLDEN DRAGON - Acceso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 1rem; background: #0a0a1a; }
    .login-card { max-width: 420px; width: 100%; }
    .login-card .card { padding: 2.5rem 2rem; }
    .login-icon { font-size: 4rem; }
    .login-error { min-height: 24px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="login-card fade-in">
    <div class="card text-center">
      <div class="mb-3">
        <div class="login-icon">&#x1F409;</div>
        <h3 class="brand-text mb-0" style="font-size:1.6rem;">GOLDEN <span class="brand-highlight">DRAGON</span></h3>
        <p class="text-white-50 mt-1 mb-0">Sistema de Gestión</p>
      </div>
      <div class="login-error" id="loginError"></div>
      <form id="loginForm" class="mt-2">
        <div class="mb-3 text-start">
          <label class="form-label">Usuario</label>
          <input class="form-control form-control-lg" id="loginUser" placeholder="Usuario" required autofocus>
        </div>
        <div class="mb-3 text-start">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control form-control-lg" id="loginPass" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-gold w-100 btn-lg mt-2" id="loginBtn">
          <i class="bi bi-box-arrow-in-right"></i> Ingresar
        </button>
      </form>
      <div class="mt-3">
        <small class="text-white-50">Admin: Golden2026 / Usuario: usuario</small>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Ingresando...';
      err.innerHTML = '';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('loginUser').value.trim(),
            password: document.getElementById('loginPass').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        window.location.href = '/';
      } catch (e) {
        err.innerHTML = '<span class="text-danger"><i class="bi bi-exclamation-triangle"></i> ' + e.message + '</span>';
      } finally {
        btn.disabled = false; btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Ingresar';
      }
    });
  </script>
</body>
</html>
